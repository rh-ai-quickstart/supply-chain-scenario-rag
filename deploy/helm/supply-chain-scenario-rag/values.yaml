global:
  models:
    llama-3-2-1b-instruct:
      enabled: true

pgvector:
  enabled: true
  secret:
    create: true
    user: postgres
    password: password
    dbname: blueprint
    host: pgvector
    port: "5432"

llama-stack:
  enabled: true
  rawDeploymentMode: true
  pgvector:
    enabled: true

llm-service:
  enabled: true
  device: cpu
  secret:
    # Required: set your Hugging Face token (https://huggingface.co/settings/tokens) for gated models.
    hf_token: ""
    enabled: true
  models:
    llama-3-2-1b-instruct:
      enabled: true
      device: cpu
      resources:
        limits:
          cpu: "4"
          memory: 8Gi
        requests:
          cpu: "2"
          memory: 6Gi
      args:
        - --max-model-len
        - "4096"
        - --max-num-seqs
        - "1"

imagePullSecrets: []

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/rh-ai-quickstart/supply-chain-scenario-rag-backend
    tag: dev
    pullPolicy: Always
  service:
    port: 8000
  route:
    enabled: false
  pgvectorSecretName: pgvector
  env:
    LLAMA_STACK_URL: http://llamastack:8321
    LLAMA_STACK_MODEL: meta-llama/Llama-3.2-1B-Instruct
    LLAMA_STACK_TIMEOUT_SECONDS: "300"
    EMBED_MODEL: all-MiniLM-L6-v2
    PG_HOST: pgvector
    PG_PORT: "5432"
    PG_USER: postgres
    PG_DB: blueprint

ingest:
  enabled: true
  image:
    repository: quay.io/rh-ai-quickstart/supply-chain-scenario-rag-ingestion
    tag: dev
    pullPolicy: Always
  strategy: "llamastack"
  knowledgeBaseDir: "data/knowledge-base"
  glob: "**/*.txt"
  # --- langchain strategy only ---
  dropOld: "true"
  # Chunking parameters forwarded to RAG pipeline.
  chunkSize: "1000"
  chunkOverlap: "200"
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/rh-ai-quickstart/supply-chain-scenario-rag-frontend
    tag: dev
    pullPolicy: Always
  service:
    port: 8080
  # Nginx /api proxy timeouts (envsubst into default.conf.template). Increase for slow LLM chat.
  apiProxy:
    connectTimeout: 360s
    sendTimeout: 360s
    readTimeout: 360s
  route:
    enabled: true
    host: ""
    timeout: 5m
