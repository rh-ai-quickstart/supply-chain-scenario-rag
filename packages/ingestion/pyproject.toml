[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "supply-chain-scenario-rag-ingestion"
version = "0.1.0"
description = "Deploy-time knowledge base ingestion for supply-chain-scenario-rag"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "httpx>=0.27.0",
    "psycopg2-binary>=2.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.6.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
